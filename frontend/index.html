<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Tracking Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>GPS Tracking and Fuel Sensor Monitoring Dashboard</h1>
    </header>
    <main>
        <section id="gps-tracking">
            <h2>GPS Tracking</h2>
            <div id="map"></div>
            <p>Current Location: <span id="current-location">Loading...</span></p>
        </section>
        <section id="fuel-monitoring">
            <h2>Fuel Sensor Monitoring</h2>
            <p>Fuel Level: <span id="fuel-level">Loading...</span></p>
            <p>Status: <span id="fuel-status">Loading...</span></p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 GPS Fuel Tracker</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
